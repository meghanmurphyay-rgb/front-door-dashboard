<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Door Dashboard</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            height: 100vh; 
            gap: 20px; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow: hidden;
        }
        .today-panel { 
            background: #222; 
            border-radius: 12px; 
            padding: 30px; 
        }
        .future-panel { 
            display: grid; 
            grid-template-rows: repeat(3, 1fr); 
            gap: 20px; 
        }
        .day-card { 
            background: #111; 
            border-radius: 12px; 
            padding: 20px; 
        }
    </style>
</head>
<body>
    <div class="today-panel">
        <h1>Today</h1>
        <div id="weather-today"></div>
        <div id="events-today"></div>
    </div>
    <div class="future-panel">
        <div class="day-card" id="day-1">
            <h3>Tomorrow</h3>
        </div>
        <div class="day-card" id="day-2">
            <h3>Day 3</h3>
        </div>
        <div class="day-card" id="day-3">
            <h3>Day 4</h3>
        </div>
    </div>
</body>
</html>
