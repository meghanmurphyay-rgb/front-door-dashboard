<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Door Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
            gap: 20px;
            overflow: hidden;
        }
        .today-panel { 
            background: #222; 
            border-radius: 12px; 
            padding: 30px; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
        }
        .weather-container {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .future-panel { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            min-height: 25vh; 
        }
        .day-card { 
            background: #111; 
            border-radius: 12px; 
            padding: 20px; 
            overflow-y: hidden;
        }
        .event-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6); 
        }
        #events-today .event-item {
            font-size: 1.4em; 
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="today-panel">
        <h1 id="today-date" style="margin-top: 0;">Loading...</h1>
        
        <div id="weather-today" class="weather-container">
            <div style="color: #aaa;">Fetching weather...</div>
        </div>

        <div id="events-today">Loading today's schedule...</div>
    </div>

    <div class="future-panel">
        <div class="day-card" id="day-1"><h3 style="margin-top: 0; color: #aaa;">Tomorrow</h3><div class="events"></div></div>
        <div class="day-card" id="day-2"><h3 style="margin-top: 0; color: #aaa;">Day 3</h3><div class="events"></div></div>
        <div class="day-card" id="day-3"><h3 style="margin-top: 0; color: #aaa;">Day 4</h3><div class="events"></div></div>
    </div>
<script>
        // --- CONFIGURATION AREA ---
        var GOOGLE_API_KEY = 'AIzaSyDkzkJnO1i7M-7dwRvI7bfbNXhdhxQmv94';
        var CALENDAR_ID = 'tealtandem@gmail.com'; 
        
        var DEFAULT_CALENDAR_COLOR = '#039be5'; // Fallback color
        
        var LATITUDE = '30.4213';  
        var LONGITUDE = '-87.2169';
        // --------------------------

        var googleColors = {
            '1': '#7986cb', '2': '#33b679', '3': '#8e24aa', '4': '#e67c73',
            '5': '#f6c026', '6': '#f5511d', '7': '#039be5', '8': '#616161',
            '9': '#3f51b5', '10': '#0b8043', '11': '#d50000'
        };

        var options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US', options);

        function getWeatherIconHTML(forecast, isDaytime) {
            var text = forecast.toLowerCase();
            var icon = 'bi-cloud-sun-fill';
            var color = '#ccc';

            if (text.indexOf('sunny') !== -1 || text.indexOf('clear') !== -1) {
                icon = isDaytime ? 'bi-sun-fill' : 'bi-moon-stars-fill';
                color = isDaytime ? '#FFD700' : '#FFF';
            } else if (text.indexOf('partly') !== -1) {
                icon = isDaytime ? 'bi-cloud-sun-fill' : 'bi-cloud-moon-fill';
                color = '#e0e0e0';
            } else if (text.indexOf('cloud') !== -1 || text.indexOf('overcast') !== -1) {
                icon = 'bi-cloud-fill';
                color = '#aaa';
            } else if (text.indexOf('rain') !== -1 || text.indexOf('shower') !== -1 || text.indexOf('drizzle') !== -1) {
                icon = 'bi-cloud-rain-fill';
                color = '#4ea8de';
            } else if (text.indexOf('thunder') !== -1 || text.indexOf('storm') !== -1) {
                icon = 'bi-cloud-lightning-rain-fill';
                color = '#8e7cc3';
            } else if (text.indexOf('snow') !== -1 || text.indexOf('flurries') !== -1) {
                icon = 'bi-snow';
                color = '#fff';
            }

            return '<i class="bi ' + icon + '" style="font-size: 5em; color: ' + color + '; line-height: 1;"></i>';
        }

        function fetchWeather() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://api.weather.gov/points/' + LATITUDE + ',' + LONGITUDE);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var pointsData = JSON.parse(xhr.responseText);
                    var forecastUrl = pointsData.properties.forecast;
                    
                    var xhr2 = new XMLHttpRequest();
                    xhr2.open('GET', forecastUrl);
                    xhr2.onload = function() {
                        if (xhr2.status === 200) {
                            var forecastData = JSON.parse(xhr2.responseText);
                            var todayWeather = forecastData.properties.periods[0];
                            var iconHTML = getWeatherIconHTML(todayWeather.shortForecast, todayWeather.isDaytime);
                            
                            document.getElementById('weather-today').innerHTML = 
                                iconHTML +
                                '<div>' +
                                '<div style="font-size: 3em; font-weight: bold;">' + todayWeather.temperature + '°</div>' +
                                '<div style="font-size: 1.2em; color: #aaa;">' + todayWeather.shortForecast + '</div>' +
                                '</div>';
                        }
                    };
                    xhr2.send();
                }
            };
            xhr.send();
        }

        function fetchCalendar() {
            var now = new Date();
            var timeMin = now.toISOString();
            var future = new Date(now.getTime() + (4 * 24 * 60 * 60 * 1000));
            var timeMax = future.toISOString();
            
            var url = 'https://www.googleapis.com/calendar/v3/calendars/' + encodeURIComponent(CALENDAR_ID) + '/events?key=' + GOOGLE_API_KEY + '&timeMin=' + timeMin + '&timeMax=' + timeMax + '&singleEvents=true&orderBy=startTime';

            var xhr = new XMLHttpRequest();
            xhr.open('GET', url);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    if (data.items) {
                        organizeEvents(data.items);
                    } else {
                        document.getElementById('events-today').innerText = 'Check Calendar ID and API Key.';
                    }
                } else {
                    document.getElementById('events-today').innerText = 'Failed to load calendar.';
                }
            };
            xhr.send();
        }

        function organizeEvents(events) {
            var now = new Date();
            var todayStr = now.toDateString();
            
            var tomorrow = new Date(now.getTime() + (24 * 60 * 60 * 1000));
            var tomorrowStr = tomorrow.toDateString();
            
            var day2 = new Date(now.getTime() + (2 * 24 * 60 * 60 * 1000));
            var day2Str = day2.toDateString();
            
            var day3 = new Date(now.getTime() + (3 * 24 * 60 * 60 * 1000));
            var day3Str = day3.toDateString();

            var todayHtml = '';
            var tomorrowHtml = '';
            var day2Html = '';
            var day3Html = '';

            var formatOptions = { weekday: 'long', month: 'short', day: 'numeric' };
            document.querySelector('#day-1 h3').innerText = tomorrow.toLocaleDateString('en-US', formatOptions);
            document.querySelector('#day-2 h3').innerText = day2.toLocaleDateString('en-US', formatOptions);
            document.querySelector('#day-3 h3').innerText = day3.toLocaleDateString('en-US', formatOptions);

            for (var i = 0; i < events.length; i++) {
                var event = events[i];
                var startObj = event.start.dateTime ? event.start.dateTime : event.start.date;
                var start = new Date(startObj);
                var eventDateStr = start.toDateString();
                
                var bgColor = event.colorId ? googleColors[event.colorId] : DEFAULT_CALENDAR_COLOR;
                var eventElement = '<div class="event-item" style="background-color: ' + bgColor + ';">' + event.summary + '</div>';

                if (eventDateStr === todayStr) {
                    todayHtml += eventElement;
                } else if (eventDateStr === tomorrowStr) {
                    tomorrowHtml += eventElement;
                } else if (eventDateStr === day2Str) {
                    day2Html += eventElement;
                } else if (eventDateStr === day3Str) {
                    day3Html += eventElement;
                }
            }

            document.getElementById('events-today').innerHTML = todayHtml || '<p style="color: #666;">No events scheduled today</p>';
            document.querySelector('#day-1 .events').innerHTML = tomorrowHtml || '<span style="color: #666;">Clear</span>';
            document.querySelector('#day-2 .events').innerHTML = day2Html || '<span style="color: #666;">Clear</span>';
            document.querySelector('#day-3 .events').innerHTML = day3Html || '<span style="color: #666;">Clear</span>';
        }

        fetchWeather();
        fetchCalendar();
        setInterval(function() {
            fetchWeather();
            fetchCalendar();
        }, 15 * 60 * 1000);
    </script>
</body>
</html>
