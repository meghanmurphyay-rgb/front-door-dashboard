<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Door Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
            gap: 20px;
            overflow: hidden;
        }
        .today-panel { 
            background: #222; 
            border-radius: 12px; 
            padding: 30px; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
        }
        .weather-container {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .future-panel { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            min-height: 25vh; 
        }
        .day-card { 
            background: #111; 
            border-radius: 12px; 
            padding: 20px; 
            overflow-y: hidden;
        }
        .event-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6); 
        }
        #events-today .event-item {
            font-size: 1.4em; 
            padding: 15px;
        }
    </style>
</head>
<body>
    <div class="today-panel">
        <h1 id="today-date" style="margin-top: 0;">Loading...</h1>
        
        <div id="weather-today" class="weather-container">
            <div style="color: #aaa;">Fetching weather...</div>
        </div>

        <div id="events-today">Loading today's schedule...</div>
    </div>

    <div class="future-panel">
        <div class="day-card" id="day-1"><h3 style="margin-top: 0; color: #aaa;">Tomorrow</h3><div class="events"></div></div>
        <div class="day-card" id="day-2"><h3 style="margin-top: 0; color: #aaa;">Day 3</h3><div class="events"></div></div>
        <div class="day-card" id="day-3"><h3 style="margin-top: 0; color: #aaa;">Day 4</h3><div class="events"></div></div>
    </div>

    <script>
        // --- CONFIGURATION AREA ---
        const GOOGLE_API_KEY = 'AIzaSyDkzkJnO1i7M-7dwRvI7bfbNXhdhxQmv94';
        const CALENDAR_ID = 'tealtandem@gmail.com'; 
        
        // If an event doesn't have a specific color, it will use this hex code. 
        const DEFAULT_CALENDAR_COLOR = '#039be5'; // Currently set to Google's standard Blue. Change to your preference.
        
        const LATITUDE = '30.4213';  
        const LONGITUDE = '-87.2169';
        // --------------------------

        const googleColors = {
            '1': '#7986cb', // Lavender
            '2': '#33b679', // Sage
            '3': '#8e24aa', // Grape
            '4': '#e67c73', // Flamingo
            '5': '#f6c026', // Banana
            '6': '#f5511d', // Tangerine
            '7': '#039be5', // Peacock
            '8': '#616161', // Graphite
            '9': '#3f51b5', // Blueberry
            '10': '#0b8043', // Basil
            '11': '#d50000'  // Tomato
        };

        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('today-date').innerText = new Date().toLocaleDateString('en-US', options);

        // Helper function to turn weather text into clean icons
        function getWeatherIconHTML(forecast, isDaytime) {
            const text = forecast.toLowerCase();
            let icon = 'bi-cloud-sun-fill';
            let color = '#ccc'; // Default color

            if (text.includes('sunny') || text.includes('clear')) {
                icon = isDaytime ? 'bi-sun-fill' : 'bi-moon-stars-fill';
                color = isDaytime ? '#FFD700' : '#FFF'; // Yellow sun, white moon
            } else if (text.includes('partly')) {
                icon = isDaytime ? 'bi-cloud-sun-fill' : 'bi-cloud-moon-fill';
                color = '#e0e0e0';
            } else if (text.includes('cloud') || text.includes('overcast')) {
                icon = 'bi-cloud-fill';
                color = '#aaa';
            } else if (text.includes('rain') || text.includes('shower') || text.includes('drizzle')) {
                icon = 'bi-cloud-rain-fill';
                color = '#4ea8de'; // Rain blue
            } else if (text.includes('thunder') || text.includes('storm')) {
                icon = 'bi-cloud-lightning-rain-fill';
                color = '#8e7cc3'; // Storm purple
            } else if (text.includes('snow') || text.includes('flurries')) {
                icon = 'bi-snow';
                color = '#fff';
            }

            return `<i class="bi ${icon}" style="font-size: 5em; color: ${color}; line-height: 1;"></i>`;
        }

        async function fetchWeather() {
            try {
                const pointsResponse = await fetch(`https://api.weather.gov/points/${LATITUDE},${LONGITUDE}`);
                const pointsData = await pointsResponse.json();
                const forecastUrl = pointsData.properties.forecast;

                const forecastResponse = await fetch(forecastUrl);
                const forecastData = await forecastResponse.json();
                const periods = forecastData.properties.periods;

                const todayWeather = periods[0];
                const iconHTML = getWeatherIconHTML(todayWeather.shortForecast, todayWeather.isDaytime);
                
                document.getElementById('weather-today').innerHTML = `
                    ${iconHTML}
                    <div>
                        <div style="font-size: 3em; font-weight: bold;">${todayWeather.temperature}°</div>
                        <div style="font-size: 1.2em; color: #aaa;">${todayWeather.shortForecast}</div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('weather-today').innerText = 'Weather currently unavailable';
            }
        }

        async function fetchCalendar() {
            const timeMin = new Date().toISOString();
            const timeMax = new Date(Date.now() + 4 * 24 * 60 * 60 * 1000).toISOString(); 
            
            const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${GOOGLE_API_KEY}&timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.items) {
                    organizeEvents(data.items);
                } else {
                    document.getElementById('events-today').innerText = 'Check Calendar ID and API Key permissions.';
                }
            } catch (error) {
                document.getElementById('events-today').innerText = 'Failed to load calendar.';
            }
        }

        function organizeEvents(events) {
            const todayStr = new Date().toDateString();
            const tomorrowStr = new Date(Date.now() + 24 * 60 * 60 * 1000).toDateString();
            const day2Str = new Date(Date.now() + 2 * 24 * 60 * 60 * 1000).toDateString();
            const day3Str = new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toDateString();

            let todayHtml = '';
            let tomorrowHtml = '';
            let day2Html = '';
            let day3Html = '';

            document.querySelector('#day-1 h3').innerText = new Date(tomorrowStr).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            document.querySelector('#day-2 h3').innerText = new Date(day2Str).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            document.querySelector('#day-3 h3').innerText = new Date(day3Str).toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

            events.forEach(event => {
                const start = event.start.dateTime ? new Date(event.start.dateTime) : new Date(event.start.date);
                const eventDateStr = start.toDateString();
                
                const bgColor = event.colorId ? googleColors[event.colorId] : DEFAULT_CALENDAR_COLOR;
                
                const eventElement = `<div class="event-item" style="background-color: ${bgColor};">${event.summary}</div>`;

                if (eventDateStr === todayStr) todayHtml += eventElement;
                else if (eventDateStr === tomorrowStr) tomorrowHtml += eventElement;
                else if (eventDateStr === day2Str) day2Html += eventElement;
                else if (eventDateStr === day3Str) day3Html += eventElement;
            });

            document.getElementById('events-today').innerHTML = todayHtml || '<p style="color: #666;">No events scheduled today</p>';
            document.querySelector('#day-1 .events').innerHTML = tomorrowHtml || '<span style="color: #666;">Clear</span>';
            document.querySelector('#day-2 .events').innerHTML = day2Html || '<span style="color: #666;">Clear</span>';
            document.querySelector('#day-3 .events').innerHTML = day3Html || '<span style="color: #666;">Clear</span>';
        }

        fetchWeather();
        fetchCalendar();
        setInterval(() => {
            fetchWeather();
            fetchCalendar();
        }, 15 * 60 * 1000);
    </script>
</body>
</html>
