<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Front Door Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { 
            margin: 0; background: #000; color: #fff; font-family: sans-serif; 
            display: flex; flex-direction: column; height: 100vh; padding: 20px; 
            box-sizing: border-box; overflow: hidden;
        }
        .today-panel { 
            background: #222; border-radius: 12px; padding: 20px 30px; 
            flex: 0 0 35vh; 
            display: flex; flex-direction: column; overflow-y: auto;
            margin-bottom: 20px;
        }
        .weather-container {
            display: flex; align-items: center; margin-bottom: 15px;
        }
        .weather-icon-wrapper {
            margin-right: 30px;
        }
        .future-panel { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            grid-gap: 20px; 
            flex: 0 0 20vh;
            margin-bottom: 20px;
        }
        .day-card { 
            background: #111; border-radius: 12px; padding: 20px; overflow-y: hidden;
        }
        .notes-panel {
            background: #1a1a1a; border-radius: 12px; padding: 20px 30px;
            flex-grow: 1; 
            overflow-y: auto;
        }
        #notes-content {
            font-size: 1.3em; line-height: 1.4; color: #ddd;
            white-space: pre-wrap; 
        }
        .event-item {
            margin-bottom: 10px; padding: 10px; border-radius: 8px;
            color: #fff; font-weight: bold; font-size: 1.1em;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6); 
        }
        #events-today .event-item { font-size: 1.3em; padding: 12px; }
    </style>
</head>
<body>
    <div id="night-shield" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; cursor: pointer;"></div>
    
    <div class="today-panel">
        <h1 id="today-date" style="margin-top: 0; margin-bottom: 10px;">Loading Date...</h1>
        <div id="weather-today" class="weather-container">
            <div style="color: #aaa;">Fetching weather...</div>
        </div>
        <div id="events-today">Loading today's schedule...</div>
    </div>

    <div class="future-panel">
        <div class="day-card" id="day-1"><h3 id="h3-day1" style="margin-top: 0; color: #aaa;">Tomorrow</h3><div id="events-day1"></div></div>
        <div class="day-card" id="day-2"><h3 id="h3-day2" style="margin-top: 0; color: #aaa;">Day 3</h3><div id="events-day2"></div></div>
        <div class="day-card" id="day-3"><h3 id="h3-day3" style="margin-top: 0; color: #aaa;">Day 4</h3><div id="events-day3"></div></div>
    </div>

    <div class="notes-panel">
        <h3 style="margin-top: 0; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 10px;">Notes</h3>
        <div id="notes-content">Loading notes from Google Doc...</div>
    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('events-today').innerHTML = '<div style="color:red;">CRASH REPORT:<br>Msg: ' + message + '<br>Line: ' + lineno + '</div>';
            return true;
        };

        // --- CONFIGURATION AREA ---
        var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIKDJ9DxdQdXSSgpdStXZmm8Bbeeadibl0DeVFVs8DNjQmHVv9np1nMRw9vA_S4KznLQ/exec';
        var DEFAULT_CALENDAR_COLOR = '#039be5'; 
        var LATITUDE = '30.4213';  
        var LONGITUDE = '-87.2169';
        var SLEEP_HOUR = 22;
        var WAKE_HOUR = 5;
        var isSnoozed = false;
        // --------------------------

        var googleColors = {
            '1': '#7986cb', '2': '#149db3', '3': '#6b0fc7', '4': '#a21185',
            '5': '#d8a405', '6': '#C1490E', '7': '#12ff39', '8': '#616161',
            '9': '#3f51b5', '10': '#0b8043', '11': '#a60707'
        };

        var dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        var monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        var shortMonthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

        var now = new Date();
        document.getElementById('today-date').innerHTML = dayNames[now.getDay()] + ', ' + monthNames[now.getMonth()] + ' ' + now.getDate();

        function getWeatherIconHTML(forecast, isDaytime) {
            var text = forecast.toLowerCase();
            var icon = 'bi-cloud-sun-fill';
            var color = '#ccc';

            if (text.indexOf('sunny') !== -1 || text.indexOf('clear') !== -1) {
                icon = isDaytime ? 'bi-sun-fill' : 'bi-moon-stars-fill'; color = isDaytime ? '#FFD700' : '#FFF';
            } else if (text.indexOf('partly') !== -1) {
                icon = isDaytime ? 'bi-cloud-sun-fill' : 'bi-cloud-moon-fill'; color = '#e0e0e0';
            } else if (text.indexOf('cloud') !== -1 || text.indexOf('overcast') !== -1) {
                icon = 'bi-cloud-fill'; color = '#aaa';
            } else if (text.indexOf('rain') !== -1 || text.indexOf('shower') !== -1 || text.indexOf('drizzle') !== -1) {
                icon = 'bi-cloud-rain-fill'; color = '#4ea8de';
            } else if (text.indexOf('thunder') !== -1 || text.indexOf('storm') !== -1) {
                icon = 'bi-cloud-lightning-rain-fill'; color = '#8e7cc3';
            } else if (text.indexOf('snow') !== -1 || text.indexOf('flurries') !== -1) {
                icon = 'bi-snow'; color = '#fff';
            }
            return '<div class="weather-icon-wrapper"><i class="bi ' + icon + '" style="font-size: 4em; color: ' + color + '; line-height: 1;"></i></div>';
        }
        
        function checkNightMode() {
            if (isSnoozed) return; 
            var currentHour = new Date().getHours();
            var shield = document.getElementById('night-shield');
            var isNight = false;
            if (SLEEP_HOUR > WAKE_HOUR) {
                isNight = (currentHour >= SLEEP_HOUR || currentHour < WAKE_HOUR);
            } else {
                isNight = (currentHour >= SLEEP_HOUR && currentHour < WAKE_HOUR);
            }
            shield.style.display = isNight ? 'block' : 'none';
        }

        document.getElementById('night-shield').addEventListener('click', function() {
            this.style.display = 'none';
            isSnoozed = true;
            setTimeout(function() {
                isSnoozed = false;
                checkNightMode();
            }, 120000); 
        });

        setInterval(checkNightMode, 60000);
        checkNightMode(); 
        
        function fetchWeather() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'https://api.weather.gov/points/' + LATITUDE + ',' + LONGITUDE);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var pointsData = JSON.parse(xhr.responseText);
                    var forecastUrl = pointsData.properties.forecast;
                    
                    var xhr2 = new XMLHttpRequest();
                    xhr2.open('GET', forecastUrl);
                    xhr2.onload = function() {
                        if (xhr2.status === 200) {
                            var forecastData = JSON.parse(xhr2.responseText);
                            var todayWeather = forecastData.properties.periods[0];
                            var iconHTML = getWeatherIconHTML(todayWeather.shortForecast, todayWeather.isDaytime);
                            
                            document.getElementById('weather-today').innerHTML = 
                                iconHTML +
                                '<div>' +
                                '<div style="font-size: 2.5em; font-weight: bold;">' + todayWeather.temperature + '°</div>' +
                                '<div style="font-size: 1.1em; color: #aaa;">' + todayWeather.shortForecast + '</div>' +
                                '</div>';
                        }
                    };
                    xhr2.send();
                } else {
                    document.getElementById('weather-today').innerHTML = '<div style="color:#aaa;">Weather API Blocked</div>';
                }
            };
            xhr.send();
        }

        function fetchCalendar() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', APPS_SCRIPT_URL);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    organizeEvents(data.events);
                    if (data.notes) {
                        document.getElementById('notes-content').innerText = data.notes;
                    }
                } else {
                    document.getElementById('events-today').innerHTML = 'Failed to load data. Status: ' + xhr.status;
                }
            };
            xhr.onerror = function() {
                document.getElementById('events-today').innerHTML = 'Network connection blocked by tablet security.';
            };
            xhr.send();
        }

        function organizeEvents(events) {
            var now = new Date();
            var todayStr = now.toDateString();
            var tomorrow = new Date(now.getTime() + (24 * 60 * 60 * 1000));
            var tomorrowStr = tomorrow.toDateString();
            var day2 = new Date(now.getTime() + (2 * 24 * 60 * 60 * 1000));
            var day2Str = day2.toDateString();
            var day3 = new Date(now.getTime() + (3 * 24 * 60 * 60 * 1000));
            var day3Str = day3.toDateString();

            var todayHtml = ''; var tomorrowHtml = ''; var day2Html = ''; var day3Html = '';

            document.getElementById('h3-day1').innerHTML = dayNames[tomorrow.getDay()] + ', ' + shortMonthNames[tomorrow.getMonth()] + ' ' + tomorrow.getDate();
            document.getElementById('h3-day2').innerHTML = dayNames[day2.getDay()] + ', ' + shortMonthNames[day2.getMonth()] + ' ' + day2.getDate();
            document.getElementById('h3-day3').innerHTML = dayNames[day3.getDay()] + ', ' + shortMonthNames[day3.getMonth()] + ' ' + day3.getDate();

            for (var i = 0; i < events.length; i++) {
                var event = events[i];
                var eventDateStr = event.dateStr;
                
                var bgColor = event.colorId ? googleColors[event.colorId] : DEFAULT_CALENDAR_COLOR;
                var eventElement = '<div class="event-item" style="background-color: ' + bgColor + ';">' + event.summary + '</div>';

                if (eventDateStr === todayStr) {
                    todayHtml += eventElement;
                } else if (eventDateStr === tomorrowStr) {
                    tomorrowHtml += eventElement;
                } else if (eventDateStr === day2Str) {
                    day2Html += eventElement;
                } else if (eventDateStr === day3Str) {
                    day3Html += eventElement;
                }
            }

            document.getElementById('events-today').innerHTML = todayHtml || '<p style="color: #666;">No events scheduled today</p>';
            document.getElementById('events-day1').innerHTML = tomorrowHtml || '<span style="color: #666;">Clear</span>';
            document.getElementById('events-day2').innerHTML = day2Html || '<span style="color: #666;">Clear</span>';
            document.getElementById('events-day3').innerHTML = day3Html || '<span style="color: #666;">Clear</span>';
        }

        fetchWeather();
        fetchCalendar();
        setInterval(function() {
            fetchWeather();
            fetchCalendar();
        }, 60 * 60 * 1000);
    </script>
</body>
</html>
